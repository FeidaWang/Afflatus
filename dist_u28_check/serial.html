<script>
(function () {
  'use strict';
  var LS = { theme:'afflatus:novels:theme', fs:'afflatus:novels:fs', waterfall:'afflatus:novels:waterfall', lastNovel:'afflatus:novels:lastNovel' };
  function nsKey(name) { return 'afflatus:novels:' + (state.novelId || 'default') + ':' + name; }
  var reader = document.getElementById('reader');
  var state = { data:null, novels:[], novelId:null, novelIdx:0, chapters:[], idx:0, autoTimer:0, waterfall:false, wfIndex:0 };

  /* V22 fix: the reader-progress bar and the toolbar are two independent
     sticky elements; the toolbar's height varies (wraps to 2 rows on
     some widths), so a hardcoded offset would drift and reopen the gap.
     Measure it live and feed it to CSS via --toolbar-h instead. */
  var toolbarEl = document.getElementById('toolbar');
  function syncToolbarH() { document.documentElement.style.setProperty('--toolbar-h', toolbarEl.offsetHeight + 'px'); }
  syncToolbarH();
  window.addEventListener('resize', syncToolbarH);
  if (window.ResizeObserver) new ResizeObserver(syncToolbarH).observe(toolbarEl);

  function toast(msg, ms) {
    var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._h); t._h = setTimeout(function () { t.classList.remove('show'); }, ms || 2200);
  }

  /* ---------- theme ---------- */
  function applyTheme(name) {
    reader.setAttribute('data-theme', name);
    document.querySelectorAll('.swatch').forEach(function (b) { b.classList.toggle('on', b.dataset.theme === name); });
    try { localStorage.setItem(LS.theme, name); } catch (e) {}
  }
  document.querySelectorAll('.swatch').forEach(function (b) { b.addEventListener('click', function () { applyTheme(b.dataset.theme); }); });

  /* ---------- font size ---------- */
  function applyFs(px) {
    px = Math.max(15, Math.min(24, px));
    document.documentElement.style.setProperty('--read-fs', px + 'px');
    try { localStorage.setItem(LS.fs, String(px)); } catch (e) {}
    return px;
  }
  var curFs = 18;
  document.getElementById('fsMinus').addEventListener('click', function () { curFs = applyFs(curFs - 1); });
  document.getElementById('fsPlus').addEventListener('click', function () { curFs = applyFs(curFs + 1); });

  /* ---------- TOC drawer ---------- */
  var drawer = document.getElementById('tocDrawer'), backdrop = document.getElementById('tocBackdrop');
  function openDrawer() { drawer.classList.add('open'); backdrop.classList.add('open'); }
  function closeDrawer() { drawer.classList.remove('open'); backdrop.classList.remove('open'); }
  document.getElementById('tocOpen').addEventListener('click', openDrawer);
  document.getElementById('fabToc').addEventListener('click', openDrawer);
  document.getElementById('tocClose').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);

  function visitedSet() { try { return new Set(JSON.parse(localStorage.getItem(nsKey('visited')) || '[]')); } catch (e) { return new Set(); } }
  function markVisited(id) { var s = visitedSet(); s.add(id); try { localStorage.setItem(nsKey('visited'), JSON.stringify(Array.from(s))); } catch (e) {} }

  function renderToc() {
    var list = document.getElementById('tocList'); list.innerHTML = '';
    var curNovel = state.novels[state.novelIdx];
    document.getElementById('tocNote').textContent = '共 ' + state.chapters.length + ' 章 · ' + ((curNovel && curNovel.novel.updateNote) || '每日更新');
    var visited = visitedSet();
    var bm = getBookmark();
    updateBookmarkBtn(bm);
    state.chapters.forEach(function (c, i) {
      var b = document.createElement('button');
      b.className = 'toc-item' + (i === state.idx ? ' current' : '');
      b.innerHTML = '<span class="t">' + (visited.has(c.id) ? '' : '● ') + c.title + '</span><span class="wc">' + (c.wordCount || '') + '字' + (bm && bm.chapterId === c.id ? ' <span class="bk">☆</span>' : '') + '</span>';
      b.addEventListener('click', function () { closeDrawer(); goToChapter(i, true); });
      list.appendChild(b);
    });
  }

  /* ---------- bookmark ----------
     U15d: bookmark now records the chapter title so the toolbar button
     itself shows what's saved (station-master's minimal-scope call: one
     bookmark per novel, not a managed list). */
  function getBookmark() { try { return JSON.parse(localStorage.getItem(nsKey('bookmark')) || 'null'); } catch (e) { return null; } }
  function truncateTitle(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }
  function updateBookmarkBtn(bm) {
    var btn = document.getElementById('bookmarkBtn');
    if (bm && bm.chapterTitle) {
      /* U16c: mobile hides .lbl (icon-only toolbar), so the saved-bookmark
         state was invisible there. Add a compact "第N章" chip (.bk-ch,
         shown ≤640px only — desktop keeps the truncated title) so the
         toolbar shows which chapter is bookmarked without overflowing. */
      var ci = state.chapters.findIndex(function (c) { return c.id === bm.chapterId; });
      var chip = ci >= 0 ? '<span class="bk-ch"> 第' + (ci + 1) + '章</span>' : '';
      btn.innerHTML = '★' + chip + '<span class="lbl"> ' + escapeHtml(truncateTitle(bm.chapterTitle, 12)) + '</span>';
      btn.title = '已保存书签：' + bm.chapterTitle;
    } else {
      btn.innerHTML = '☆<span class="lbl"> 书签</span>';
      btn.removeAttribute('title');
    }
  }
  function setBookmark() {
    var c = state.chapters[state.idx];
    var bm = { chapterId: c.id, chapterTitle: c.title, scrollY: window.scrollY, ts: Date.now() };
    try { localStorage.setItem(nsKey('bookmark'), JSON.stringify(bm)); } catch (e) {}
    toast('已保存书签：' + c.title);
    renderToc();
  }
  function goBookmark() {
    var bm = getBookmark();
    if (!bm) { toast('还没有书签，先在想要标记的地方点一下「书签」吧'); return; }
    var i = state.chapters.findIndex(function (c) { return c.id === bm.chapterId; });
    if (i < 0) { toast('书签指向的章节不存在了'); return; }
    if (state.waterfall) { resetWaterfallFrom(i, true); }
    else { loadChapter(i, true, function () { window.scrollTo({ top: bm.scrollY, behavior: 'smooth' }); }); }
    toast('已跳转到书签位置');
  }
  document.getElementById('bookmarkBtn').addEventListener('click', setBookmark);
  document.getElementById('fabBookmarkGo').addEventListener('click', goBookmark);

  /* ---------- reading progress (per-chapter + persisted "continue reading") ---------- */
  function saveProgress() {
    if (!state.chapters.length) return;
    try { localStorage.setItem(nsKey('progress'), JSON.stringify({ chapterId: state.chapters[state.idx].id, scrollY: window.scrollY, ts: Date.now() })); } catch (e) {}
  }
  var progressSaveTimer = 0;
  window.addEventListener('scroll', function () {
    updateProgressBar();
    clearTimeout(progressSaveTimer); progressSaveTimer = setTimeout(saveProgress, 400);
  }, { passive: true });

  function updateProgressBar() {
    var art = reader, rect = art.getBoundingClientRect();
    var scrolled = Math.min(Math.max(-rect.top, 0), art.scrollHeight);
    var pct = art.scrollHeight > 0 ? Math.min(100, (scrolled / art.scrollHeight) * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
  }

  /* ---------- chapter rendering ---------- */
  function renderBlocks(blocks) {
    return blocks.map(function (b) {
      if (b.type === 'sys') return '<div class="sys">' + escapeHtml(b.text) + '</div>';
      return '<p>' + escapeHtml(b.text) + '</p>';
    }).join('');
  }
  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function loadChapter(i, scrollToTop, after) {
    if (i < 0 || i >= state.chapters.length) return;
    state.idx = i;
    var c = state.chapters[i];
    document.getElementById('chapterTitle').textContent = c.title;
    document.getElementById('chapterMeta').textContent = '第 ' + (i + 1) + ' / ' + state.chapters.length + ' 章 · 约 ' + (c.wordCount || 0) + ' 字';
    document.getElementById('chapterBody').innerHTML = renderBlocks(c.blocks);
    document.getElementById('chapterIndicator').textContent = (i + 1) + ' / ' + state.chapters.length;
    document.getElementById('prevChapter').disabled = i === 0;
    document.getElementById('nextChapter').disabled = i === state.chapters.length - 1;
    markVisited(c.id);
    renderToc();
    if (scrollToTop !== false) window.scrollTo({ top: reader.offsetTop - 10, behavior: 'smooth' });
    updateProgressBar();
    saveProgress();
    if (after) setTimeout(after, 260);
  }

  document.getElementById('prevChapter').addEventListener('click', function () { goToChapter(state.idx - 1, true); });
  document.getElementById('nextChapter').addEventListener('click', function () { goToChapter(state.idx + 1, true); });

  /* ---------- unified navigation entry point (respects waterfall mode) ---------- */
  function goToChapter(i, scrollToTop) {
    if (i < 0 || i >= state.chapters.length) return;
    if (state.waterfall) { resetWaterfallFrom(i, scrollToTop); }
    else { loadChapter(i, scrollToTop); }
  }

  /* ---------- waterfall / infinite-scroll reading ("瀑布流阅读") ---------- */
  var wfList = document.getElementById('waterfallList');
  var wfSentinel = document.getElementById('wfSentinel');
  var wfSentinelText = document.getElementById('wfSentinelText');
  var wfChip = document.getElementById('wfChip');
  var wfHeaderObserver = null, wfSentinelObserver = null;
  var wfDone = false;

  function wfAppendChapter(i) {
    var c = state.chapters[i];
    var sec = document.createElement('section');
    sec.className = 'wf-chapter';
    sec.dataset.idx = String(i);
    sec.innerHTML = '<h2>' + escapeHtml(c.title) + '</h2>' +
      '<p class="meta">第 ' + (i + 1) + ' / ' + state.chapters.length + ' 章 · 约 ' + (c.wordCount || 0) + ' 字</p>' +
      '<div class="body">' + renderBlocks(c.blocks) + '</div>';
    wfList.appendChild(sec);
    if (i < state.chapters.length - 1) {
      var div = document.createElement('div'); div.className = 'wf-divider'; div.textContent = '继续下滑 · 下一章';
      wfList.appendChild(div);
    }
    markVisited(c.id);
    if (wfHeaderObserver) wfHeaderObserver.observe(sec);
    return sec;
  }

  function wfLoadNext() {
    if (wfDone) return;
    var next = state.wfIndex + 1;
    if (next >= state.chapters.length) {
      wfDone = true;
      wfSentinel.classList.add('done');
      wfSentinelText.textContent = '已经是最新一章啦，明天再来吧～';
      if (wfSentinelObserver) wfSentinelObserver.disconnect();
      return;
    }
    state.wfIndex = next;
    wfAppendChapter(next);
    renderToc();
  }

  function setupWfObservers() {
    if ('IntersectionObserver' in window) {
      wfHeaderObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting) {
            var i = Number(en.target.dataset.idx);
            state.idx = i;
            wfChip.textContent = '第 ' + (i + 1) + ' / ' + state.chapters.length + ' 章 · ' + state.chapters[i].title.replace(/^第\d+章\s*·\s*/, '');
            renderToc();
          }
        });
      }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });
      wfSentinelObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) { if (en.isIntersecting) wfLoadNext(); });
      }, { rootMargin: '800px 0px' });
      wfSentinelObserver.observe(wfSentinel);
    }
  }

  function resetWaterfallFrom(i, scrollToTop) {
    wfList.innerHTML = '';
    wfDone = false;
    wfSentinel.classList.remove('done');
    wfSentinelText.textContent = '继续下滑，自动加载下一章…';
    state.wfIndex = i;
    wfAppendChapter(i);
    if (i + 1 < state.chapters.length) { state.wfIndex = i + 1; wfAppendChapter(i + 1); }
    renderToc();
    saveProgress();
    if (scrollToTop !== false) window.scrollTo({ top: reader.offsetTop - 10, behavior: 'smooth' });
  }

  function enableWaterfall() {
    state.waterfall = true;
    document.getElementById('readerNormal').hidden = true;
    document.getElementById('readerWaterfall').hidden = false;
    wfChip.classList.add('show');
    document.getElementById('waterfallToggle').classList.add('active');
    if (!wfHeaderObserver) setupWfObservers();
    resetWaterfallFrom(state.idx, false);
    try { localStorage.setItem(LS.waterfall, '1'); } catch (e) {}
    toast('无限流已开启，一直下滑即可连续阅读～');
  }
  function disableWaterfall() {
    state.waterfall = false;
    document.getElementById('readerNormal').hidden = false;
    document.getElementById('readerWaterfall').hidden = true;
    wfChip.classList.remove('show');
    document.getElementById('waterfallToggle').classList.remove('active');
    loadChapter(state.idx, false);
    try { localStorage.setItem(LS.waterfall, '0'); } catch (e) {}
  }
  document.getElementById('waterfallToggle').addEventListener('click', function () { state.waterfall ? disableWaterfall() : enableWaterfall(); });

  /* ---------- auto-scroll ("自动翻页") ----------
     U15b: single fixed speed — half-way between the old "慢"(0.4) and
     "中"(0.9) presets, per station-master decision to drop the 3-speed
     picker for a shorter mobile-friendly toolbar. */
  var AUTO_SPEED_PX = 0.65;
  function startAuto() {
    stopAuto(false);
    var btn = document.getElementById('autoToggle'); btn.innerHTML = '❚❚<span class="lbl"> 停止翻页</span>'; btn.classList.add('active');
    state.autoTimer = setInterval(function () {
      window.scrollBy(0, AUTO_SPEED_PX);
      if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 4) {
        if (state.waterfall) { if (wfDone) { stopAuto(); toast('已经是最新一章啦，明天再来吧～'); } }
        else if (state.idx < state.chapters.length - 1) { loadChapter(state.idx + 1, true); } else { stopAuto(); toast('已经是最新一章啦，明天再来吧～'); }
      }
    }, 16);
  }
  function stopAuto() {
    clearInterval(state.autoTimer); state.autoTimer = 0;
    var btn = document.getElementById('autoToggle'); btn.innerHTML = '▶<span class="lbl"> 自动翻页</span>'; btn.classList.remove('active');
  }
  document.getElementById('autoToggle').addEventListener('click', function () { state.autoTimer ? stopAuto() : startAuto(); });
  /* U16b fix: on touch devices, tapping the 停止翻页 button fired this
     window-level touchstart FIRST (stopAuto + "检测到手动滑动" toast), so the
     button's own click handler then saw autoTimer===0 and RESTARTED the
     scroll — the button could never stop it. Ignore touches/wheel events
     that originate on the toggle itself; the click handler owns those. */
  ['touchstart','wheel'].forEach(function (ev) {
    window.addEventListener(ev, function (e) {
      if (!state.autoTimer) return;
      var t = e.target;
      if (t && t.closest && t.closest('#autoToggle')) return;
      stopAuto(); toast('检测到手动滑动，已暂停自动翻页');
    }, { passive: true });
  });

  /* ---------- FAB ---------- */
  var fabMenu = document.getElementById('fabMenu'), fabToggle = document.getElementById('fabToggle');
  fabToggle.addEventListener('click', function () { fabMenu.classList.toggle('open'); });
  document.getElementById('fabTop').addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); fabMenu.classList.remove('open'); });
  document.getElementById('fabTheme').addEventListener('click', function () {
    var order = ['imperial','green','night']; var cur = reader.getAttribute('data-theme'); var next = order[(order.indexOf(cur) + 1) % order.length];
    applyTheme(next); fabMenu.classList.remove('open'); toast('已切换到' + ({imperial:'皇木（尊贵护眼）',green:'豆沙绿护眼',night:'夜间琥珀（低蓝光）'})[next]);
  });

  /* ---------- retro backdrop canvas ---------- */
  (function () {
    var cv = document.getElementById('retroCanvas'); if (!cv || !cv.getContext) return;
    var ctx = cv.getContext('2d'); var RM = (function () { try { return matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) { return false; } })();
    var W, H, raf = 0;
    function init() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
    function frame(t) {
      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(201,131,74,0.06)'; ctx.lineWidth = 1;
      var step = 64;
      for (var x = (t * 0.004) % step; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (var y = (t * 0.002) % step; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
      ctx.strokeStyle = 'rgba(79,214,196,0.05)';
      var r = 90 + 60 * Math.sin(t * 0.0003);
      ctx.beginPath(); ctx.arc(W * 0.85, H * 0.15, r, 0, 6.283); ctx.stroke();
      raf = requestAnimationFrame(frame);
    }
    init(); if (RM) { frame(0); cancelAnimationFrame(raf); raf = 0; } else raf = requestAnimationFrame(frame);
    addEventListener('resize', function () { clearTimeout(window.__st2); window.__st2 = setTimeout(init, 200); });
    document.addEventListener('visibilitychange', function () { if (document.hidden && raf) { cancelAnimationFrame(raf); raf = 0; } else if (!document.hidden && !raf && !RM) raf = requestAnimationFrame(frame); });
  })();

  /* ---------- bookshelf ---------- */
  function renderShelf() {
    var shelf = document.getElementById('shelf'); shelf.innerHTML = '';
    state.novels.forEach(function (n, i) {
      var b = document.createElement('button');
      b.className = 'book' + (i === state.novelIdx ? ' active' : '');
      b.type = 'button';
      b.innerHTML = '<span class="bk-badge">正在阅读</span>' +
        '<h3>' + escapeHtml(n.novel.title) + '</h3>' +
        '<p class="bk-sub">' + escapeHtml(n.novel.subtitle || '') + '</p>' +
        '<p class="bk-meta">共 ' + n.chapterCount + ' 章 · ' + escapeHtml(n.novel.author || '') + '</p>';
      b.addEventListener('click', function () { if (i !== state.novelIdx) selectNovel(i, true); });
      shelf.appendChild(b);
    });
  }

  function renderHud(hud) {
    var panel = document.getElementById('hudPanel'); panel.innerHTML = '';
    (hud || []).forEach(function (g) {
      var div = document.createElement('div'); div.className = 'gauge';
      div.innerHTML = '<div class="lb"><span>' + escapeHtml(g.label) + '</span><b>' + escapeHtml(g.value) + '</b></div>' +
        '<div class="track"><i style="width:' + (g.pct || 0) + '%"></i></div>';
      panel.appendChild(div);
    });
  }

  /* ---------- select / switch novel ---------- */
  function selectNovel(idx, scrollToShelf) {
    var n = state.novels[idx]; if (!n) return;
    if (!n.chapters) {
      fetch('/novels/' + n.id + '.json').then(function (r) { return r.json(); }).then(function (data) {
        n.chapters = data.chapters;
        selectNovel(idx, scrollToShelf);
      }).catch(function () {
        document.getElementById('chapterTitle').textContent = '内容加载失败';
        document.getElementById('chapterBody').innerHTML = '<p>暂时无法读取小说数据，请刷新页面重试。</p>';
      });
      return;
    }
    state.novelIdx = idx;
    state.novelId = n.id;
    state.chapters = n.chapters;
    state.waterfall = false;

    document.getElementById('novelKicker').textContent = (n.novel.tags || []).slice(0, 4).join(' · ') || '无限流 · 连载中';
    document.getElementById('novelTitle').textContent = n.novel.title;
    document.getElementById('novelSub').textContent = n.novel.subtitle || '';
    document.getElementById('novelIntro').textContent = n.novel.intro;
    document.getElementById('novelAuthor').textContent = n.novel.author;
    document.getElementById('novelUpdateNote').textContent = n.novel.updateNote;
    document.getElementById('novelStart').textContent = n.novel.startDate;
    var tagsEl = document.getElementById('novelTags'); tagsEl.innerHTML = '';
    (n.novel.tags || []).forEach(function (tg) { var s = document.createElement('span'); s.className = 'tag'; s.textContent = tg; tagsEl.appendChild(s); });
    renderHud(n.novel.hud);
    renderShelf();
    document.title = 'Project Afflatus · Novels — ' + n.novel.title;

    try { localStorage.setItem(LS.lastNovel, n.id); } catch (e) {}

    var resumeIdx = 0, resumeScroll = null;
    try {
      var prog = JSON.parse(localStorage.getItem(nsKey('progress')) || 'null');
      if (prog) { var i = state.chapters.findIndex(function (c) { return c.id === prog.chapterId; }); if (i >= 0) { resumeIdx = i; resumeScroll = prog.scrollY; } }
    } catch (e) {}

    document.getElementById('readerNormal').hidden = false;
    document.getElementById('readerWaterfall').hidden = true;
    wfChip.classList.remove('show');
    document.getElementById('waterfallToggle').classList.remove('active');

    var wantWaterfall = false; try { wantWaterfall = localStorage.getItem(LS.waterfall) === '1'; } catch (e) {}
    if (wantWaterfall) {
      setupWfObservers();
      state.waterfall = true;
      document.getElementById('readerNormal').hidden = true;
      document.getElementById('readerWaterfall').hidden = false;
      wfChip.classList.add('show');
      document.getElementById('waterfallToggle').classList.add('active');
      resetWaterfallFrom(resumeIdx, true);
      if (resumeIdx > 0) toast('已为你恢复到上次的阅读位置（瀑布流模式）');
    } else {
      loadChapter(resumeIdx, true, function () {
        if (resumeScroll != null) { window.scrollTo({ top: resumeScroll }); if (resumeIdx > 0 || resumeScroll > 40) toast('已为你恢复到上次的阅读位置'); }
      });
    }
    if (scrollToShelf) toast('已切换到《' + n.novel.title + '》');
  }

  /* ---------- boot ---------- */
  function boot() {
    var savedTheme = 'imperial'; try { savedTheme = localStorage.getItem(LS.theme) || 'imperial'; } catch (e) {}
    applyTheme(savedTheme);
    var savedFs = 18; try { savedFs = Number(localStorage.getItem(LS.fs)) || 18; } catch (e) {}
    curFs = applyFs(savedFs);

    fetch('/novels-index.json').then(function (r) { return r.json(); }).then(function (data) {
      state.novels = data.novels || [];
      if (!state.novels.length) throw new Error('no novels');

      var startIdx = 0;
      try {
        var lastId = localStorage.getItem(LS.lastNovel);
        if (lastId) { var i = state.novels.findIndex(function (n) { return n.id === lastId; }); if (i >= 0) startIdx = i; }
      } catch (e) {}

      selectNovel(startIdx, false);
    }).catch(function () {
      document.getElementById('chapterTitle').textContent = '内容加载失败';
      document.getElementById('chapterBody').innerHTML = '<p>暂时无法读取小说数据，请刷新页面重试。</p>';
    });
  }
  if (document.readyState !== 'loading') boot(); else document.addEventListener('DOMContentLoaded', boot);
})();
</script>
</body>
